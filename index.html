<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stacky Playground</title>
    <style>
        :root {
            --bg: #fafafa;
            --surface: #fff;
            --border: #e0e0e0;
            --text: #333;
            --muted: #999;
            --accent: #d63384;
            --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            display: flex;
            align-items: baseline;
            gap: 10px;
        }

        header h1 {
            font-size: 1.25rem;
            font-weight: 600;
        }

        header span {
            font-size: 0.75rem;
            color: var(--muted);
        }

        main {
            flex: 1;
            display: grid;
            grid-template-columns: 1fr 360px;
            grid-template-rows: 1fr auto;
            gap: 1px;
            background: var(--border);
        }

        .panel {
            background: var(--surface);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .panel-header {
            padding: 8px 16px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        #editor {
            flex: 1;
            width: 100%;
            border: none;
            padding: 16px;
            font-family: var(--mono);
            font-size: 0.88rem;
            line-height: 1.7;
            resize: none;
            outline: none;
            tab-size: 2;
            background: var(--surface);
            color: var(--text);
        }

        #editor:focus {
            background: #fafafa;
        }

        #stack-view {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            display: flex;
            flex-direction: column-reverse;
            gap: 4px;
        }

        .tree-node {
            font-family: var(--mono);
            font-size: 0.82rem;
            padding: 8px 12px;
            border-radius: 6px;
            background: #f9f9f9;
            border: 1px solid var(--border);
        }

        .tree-node.top {
            border-color: var(--accent);
        }

        .tree-node .label {
            color: var(--accent);
            font-weight: 600;
        }

        .tree-children {
            margin-left: 18px;
            border-left: 1.5px solid #e8e8e8;
            padding-left: 12px;
        }

        .empty-stack {
            color: var(--muted);
            font-style: italic;
            padding: 16px;
            text-align: center;
            font-size: 0.85rem;
        }

        .controls {
            grid-column: 1 / -1;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: var(--surface);
            border-top: 1px solid var(--border);
        }

        .controls button {
            padding: 6px 16px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            background: var(--surface);
            color: var(--text);
            transition: all .12s;
        }

        .controls button:hover {
            background: #f0f0f0;
            border-color: #ccc;
        }

        .controls button:disabled {
            opacity: .45;
            cursor: default;
        }

        .btn-run {
            background: var(--accent);
            color: #fff;
            border-color: var(--accent);
        }

        .btn-run:hover {
            background: #c2256e;
        }

        #status {
            margin-left: auto;
            font-size: 0.78rem;
            color: var(--muted);
            display: flex;
            gap: 18px;
        }

        #status b {
            color: var(--text);
        }

        #error-msg {
            grid-column: 1 / -1;
            padding: 6px 24px;
            font-family: var(--mono);
            font-size: 0.78rem;
            color: #c00;
            background: #fff5f5;
            border-top: 1px solid #fcc;
            display: none;
        }

        #error-msg.show {
            display: block;
        }
    </style>
</head>

<body>

    <header>
        <h1>Stacky</h1>
        <span>WASM playground</span>
    </header>

    <main>
        <div class="panel">
            <div class="panel-header">Program</div>
            <textarea id="editor" spellcheck="false">(begin
  (push bread)
  (push lettuce)
  (push cheese)
  (push ham)
  (squish filling 3)
  (push bread)
  (squish sandwich 3))</textarea>
        </div>

        <div class="panel">
            <div class="panel-header">Stack</div>
            <div id="stack-view">
                <div class="empty-stack">Press Step or Run All</div>
            </div>
        </div>

        <div id="error-msg"></div>

        <div class="controls">
            <button id="btn-step">Step</button>
            <button class="btn-run" id="btn-run">Run All</button>
            <button id="btn-reset">Reset</button>
            <div id="status">
                <span>steps <b id="step-count">0</b></span>
                <span>stack <b id="stack-len">0</b></span>
                <span id="state-label">ready</span>
            </div>
        </div>
    </main>

    <script type="module">
        import init, { Program } from '/pkg/stacky.js';

        let program = null;

        const editor = document.getElementById('editor');
        const stackView = document.getElementById('stack-view');
        const errorMsg = document.getElementById('error-msg');
        const btnStep = document.getElementById('btn-step');
        const btnRun = document.getElementById('btn-run');
        const btnReset = document.getElementById('btn-reset');
        const stepCount = document.getElementById('step-count');
        const stackLen = document.getElementById('stack-len');
        const stateLbl = document.getElementById('state-label');

        function esc(s) {
            return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        function renderTree(tree) {
            if (!tree) return '<i>empty</i>';
            if ('Leaf' in tree) return `"${esc(tree.Leaf)}"`;
            if ('Branch' in tree) {
                const [name, children] = tree.Branch;
                let html = `<span class="label">${esc(name)}</span>`;
                if (children && children.length > 0) {
                    html += '<div class="tree-children">';
                    for (const c of children) html += `<div>${renderTree(c)}</div>`;
                    html += '</div>';
                }
                return html;
            }
            return esc(JSON.stringify(tree));
        }

        function showStack() {
            stackView.innerHTML = '';
            if (!program) {
                stackView.innerHTML = '<div class="empty-stack">Nothing loaded</div>';
                return;
            }
            const len = program.stack_len();
            if (len === 0) {
                stackView.innerHTML = '<div class="empty-stack">Stack is empty</div>';
                return;
            }
            for (let i = len - 1; i >= 0; i--) {
                const d = len - 1 - i;
                const div = document.createElement('div');
                div.className = 'tree-node' + (d === 0 ? ' top' : '');
                div.innerHTML = renderTree(program.peek(d));
                stackView.appendChild(div);
            }
        }

        function updateStatus() {
            if (!program) {
                stateLbl.textContent = '—'; stepCount.textContent = '0'; stackLen.textContent = '0';
                btnStep.disabled = btnRun.disabled = true;
                return;
            }
            const done = program.done;
            stateLbl.textContent = done ? 'done' : 'running';
            stackLen.textContent = program.stack_len();
            btnStep.disabled = done;
            btnRun.disabled = done;
        }

        function clearError() { errorMsg.classList.remove('show'); }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        function loadProgram(source) {
            clearError();
            try {
                program = new Program(source);
                stepCount.textContent = '0';
                updateStatus();
                showStack();
            } catch (e) {
                program = null;
                updateStatus();
                showStack();
                showError('Parse error: ' + e);
            }
        }

        function doStep() {
            if (!program || program.done) return;
            clearError();
            try {
                program.step();
                stepCount.textContent = String(Number(stepCount.textContent) + 1);
                updateStatus();
                showStack();
            } catch (e) {
                updateStatus();
                showStack();
                showError('Runtime error: ' + e);
            }
        }

        function doRunAll() {
            if (!program || program.done) return;
            clearError();
            try {
                program.run_all();
                stepCount.textContent = '—';
                updateStatus();
                showStack();
            } catch (e) {
                updateStatus();
                showStack();
                showError('Runtime error: ' + e);
            }
        }

        btnStep.addEventListener('click', doStep);
        btnRun.addEventListener('click', doRunAll);
        btnReset.addEventListener('click', () => loadProgram(editor.value));

        document.addEventListener('keydown', e => {
            if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); doRunAll(); }
        });

        await init();
        loadProgram(editor.value);
    </script>

</body>

</html>
